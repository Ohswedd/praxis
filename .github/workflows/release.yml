name: validate-and-release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Validate JSON manifests
        run: |
          python - <<'PY'
          import json, sys, pathlib
          errors = []
          for p in pathlib.Path(".").rglob("*.json"):
              if "node_modules" in str(p):
                  continue
              try:
                  json.loads(p.read_text(encoding="utf-8"))
              except Exception as e:
                  errors.append(f"{p}: {e}")
          # required manifests must exist
          for req in [".claude-plugin/marketplace.json",
                      "plugins/praxis/.claude-plugin/plugin.json",
                      "plugins/praxis/hooks/hooks.json"]:
              if not pathlib.Path(req).exists():
                  errors.append(f"missing required file: {req}")
          if errors:
              print("\n".join(errors)); sys.exit(1)
          print("All JSON manifests valid.")
          PY

      - name: Byte-compile hook scripts
        run: python -m compileall plugins/praxis/scripts

      - name: Plugin self-integrity check
        run: python plugins/praxis/scripts/selfcheck.py

      - name: Run test suite
        run: python -m unittest discover -s tests -v

      - name: Check plugin/marketplace versions agree
        run: |
          python - <<'PY'
          import json, sys
          pv = json.load(open("plugins/praxis/.claude-plugin/plugin.json"))["version"]
          mv = json.load(open(".claude-plugin/marketplace.json"))["metadata"]["version"]
          if pv != mv:
              print(f"version mismatch: plugin={pv} marketplace={mv}"); sys.exit(1)
          print(f"versions agree: {pv}")
          PY

  release:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # The release pushes a commit and a tag to `main`. A protected branch
          # rejects pushes made with the default GITHUB_TOKEN, so allow a
          # RELEASE_TOKEN (a PAT or GitHub App token permitted to bypass) to be
          # supplied. Falls back to the default token when main is unprotected.
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Derive next version from conventional commits
        id: bump
        run: |
          # feat: -> minor, fix:/perf:/refactor: -> patch, BREAKING CHANGE/!: -> major
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          range="${last_tag}..HEAD"
          [ "$last_tag" = "v0.0.0" ] && range="HEAD"
          log=$(git log --pretty=%s%n%b "$range")
          major=0; minor=0; patch=0
          echo "$log" | grep -qiE '(^|\n)(feat|fix|refactor|perf)(\(.+\))?!:' && major=1
          echo "$log" | grep -qi 'BREAKING CHANGE' && major=1
          echo "$log" | grep -qiE '(^|\n)feat(\(.+\))?:' && minor=1
          echo "$log" | grep -qiE '(^|\n)(fix|perf|refactor)(\(.+\))?:' && patch=1
          cur=${last_tag#v}; IFS='.' read -r a b c <<EOF
          $cur
          EOF
          a=${a:-0}; b=${b:-0}; c=${c:-0}
          if [ "$major" = 1 ]; then a=$((a+1)); b=0; c=0;
          elif [ "$minor" = 1 ]; then b=$((b+1)); c=0;
          elif [ "$patch" = 1 ]; then c=$((c+1));
          else echo "no release-worthy commits"; echo "release=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          echo "version=$a.$b.$c" >> "$GITHUB_OUTPUT"
          echo "release=true" >> "$GITHUB_OUTPUT"

      - name: Preflight — confirm this job may write to main
        if: steps.bump.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN != '' }}
        run: |
          # Fail BEFORE anything is stamped or tagged. A push rejected halfway
          # leaves manifests bumped locally, no tag on the remote, and a release
          # step that then fails on --verify-tag — a confusing state to unpick.
          # Only rules that actually block a direct push count; a repo can carry
          # benign rulesets (tag rules, linear history) that this must not trip on.
          blocking=$(gh api "repos/${GITHUB_REPOSITORY}/rules/branches/${GITHUB_REF_NAME}" \
            --jq '[.[] | select(.type == "pull_request" or .type == "required_status_checks")] | length' \
            2>/dev/null || echo 0)
          if gh api "repos/${GITHUB_REPOSITORY}/branches/${GITHUB_REF_NAME}/protection" \
               --jq '.required_pull_request_reviews' >/dev/null 2>&1; then
            blocking=$((blocking + 1))
          fi
          if [ "$blocking" -gt 0 ] && [ "$HAS_RELEASE_TOKEN" != "true" ]; then
            echo "::error::${GITHUB_REF_NAME} requires pull requests, but no RELEASE_TOKEN secret is set." \
                 "This job must push the chore(release) commit and tag directly." \
                 "Fix by either (a) adding a RELEASE_TOKEN secret — a PAT or GitHub App token" \
                 "allowed to bypass the rule — or (b) permitting github-actions[bot] to bypass it." \
                 "See CONTRIBUTING.md section Releases."
            exit 1
          fi
          echo "Writable: blocking_rules=$blocking release_token=$HAS_RELEASE_TOKEN"

      - name: Stamp version into manifests and tag
        if: steps.bump.outputs.release == 'true'
        run: |
          v="${{ steps.bump.outputs.version }}"
          python - "$v" <<'PY'
          import json, sys
          v = sys.argv[1]
          for path, keypath in [
              ("plugins/praxis/.claude-plugin/plugin.json", ["version"]),
              (".claude-plugin/marketplace.json", ["metadata", "version"]),
          ]:
              d = json.load(open(path)); node = d
              for k in keypath[:-1]: node = node[k]
              node[keypath[-1]] = v
              json.dump(d, open(path, "w"), indent=2); open(path,"a").write("\n")
          PY
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "chore(release): v$v" || true
          git tag "v$v"
          if ! git push origin HEAD; then
            echo "::error::Could not push the release commit to ${GITHUB_REF_NAME}." \
                 "If the branch is protected, set a RELEASE_TOKEN secret that may bypass it" \
                 "(see CONTRIBUTING.md § Releases). No tag was pushed, so re-running this" \
                 "job after fixing the permission is safe."
            exit 1
          fi
          git push origin "v$v"

      - name: Publish the GitHub release
        if: steps.bump.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Tagging alone leaves no release page — v1.2.0 and v1.2.1 were tagged
          # but never published, because this step used to be a manual one.
          v="${{ steps.bump.outputs.version }}"
          notes=$(python3 - "$v" <<'PY'
          import re, sys, pathlib
          version = sys.argv[1]
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          # The section for this version, up to the next version heading.
          m = re.search(rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)",
                        text, re.MULTILINE | re.DOTALL)
          print(m.group(1).strip() if m else "")
          PY
          )
          # Never publish an empty release page: if the changelog section is
          # missing or the extraction failed, say where the notes actually are.
          if [ -z "$notes" ]; then
            notes="See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/v$v/CHANGELOG.md) for the changes in v$v."
          fi
          # --latest explicitly: GitHub otherwise infers it from creation order, so
          # backfilling an older tag later would move the badge off the newest version.
          gh release create "v$v" --title "Praxis v$v" --notes "$notes" \
            --verify-tag --latest
